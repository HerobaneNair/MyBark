<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FAQ - MyBark</title>
  <link rel="icon" href="favicon.jfif" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400&family=Poppins:wght@300&display=swap" rel="stylesheet">
  <style>body{font-family:'Poppins',sans-serif} h1,h2,h3{font-family:'Lora',serif}</style>
</head>
<body data-page="faq" class="bg-slate-50 text-slate-800">

<div id="site-nav"></div>

<header class="bg-gradient-to-br from-slate-900 to-slate-800 text-white">
  <div class="max-w-7xl mx-auto px-6 py-20">
    <p class="uppercase tracking-[0.2em] text-amber-500 text-xs font-semibold mb-3">Frequently Asked Questions</p>
    <h1 class="text-4xl md:text-5xl font-bold mb-4">Your Questions Answered</h1>
    <p class="text-slate-300 max-w-3xl">Everything you need to know about MyBark's services, registration process and how we can help you.</p>
  </div>
</header>

<section class="max-w-3xl mx-auto px-6 py-20 space-y-4" id="faq-section">
  <div id="faq-container" class="space-y-4"></div>
</section>

<div id="site-footer"></div>
<script src="main.js"></script>
<script>
  (function() {
    const plusIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-amber-500 transition-transform duration-200 shrink-0"><path d="M10.75 4.75a.75.75 0 0 0-1.5 0v4.5h-4.5a.75.75 0 0 0 0 1.5h4.5v4.5a.75.75 0 0 0 1.5 0v-4.5h4.5a.75.75 0 0 0 0-1.5h-4.5v-4.5z"/></svg>`;
    const minusIcon = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5 text-amber-500 transition-transform duration-200 shrink-0"><path d="M4.75 10.25a.75.75 0 0 1 0-1.5h10.5a.75.75 0 0 1 0 1.5H4.75z"/></svg>`;

    const faqData = [
      { question: "How do I sign up with MyBark?", answer: "MyBark only works with registered users. To sign up, contact us via WhatsApp at +1234567890 or email us at info@mybark.org. Our team will guide you through identity verification and onboarding. Once registered, you will have access to our full range of services." },
      { question: "What types of fees can MyBark pay on my behalf?", answer: "We handle payments to government agencies, regulatory bodies, courts, municipalities, and other official institutions. This includes utility fees, statutory filings, registration charges and more. Each payment is processed with a full audit trail and confirmation provided to you." },
      { question: "Is my information kept confidential?", answer: "Yes. Confidentiality is a core part of how we operate. All client information, documents and transaction records are stored securely and are only accessible to authorised MyBark personnel. We never share client information with third parties." },
      { question: "Do you operate outside Kerala?", answer: "Our offices are currently in Cochin, Thiruvananthapuram and Kottayam. However, we can provide services across India where logistics and circumstances permit. Contact us to discuss your specific requirements and location." },
      { question: "What does power of attorney with MyBark involve?", answer: "We can act as your power of attorney for fee payments, property management and document handling activities. This means you formally authorise MyBark to act on your behalf for these specific activities. All such arrangements are formalised in writing with clearly defined scope and limitations." },
      { question: "How are my documents stored?", answer: "Legal documents entrusted to MyBark are held in secure physical and/or digital storage depending on the document type and your preferences. We maintain strict access logs, and documents can be retrieved by authorised parties upon verified request." },
      { question: "What are your fees for services?", answer: "Our fees vary depending on the nature and scope of services required. Contact us directly via WhatsApp or email to discuss your needs, and we will provide a clear breakdown of applicable charges before any engagement begins." },
      { question: "Can MyBark manage multiple properties for me?", answer: "Yes, we can manage records and documentation for multiple rental properties or real estate assets. This includes tracking agreements, compliance documents, payment records and correspondence. Our team can work to a system that suits your portfolio's complexity." }
    ];

    function toggleFaq(button) {
      const item = button.closest('.faq-item');
      if (!item) return;
      const answer = item.querySelector('.faq-answer');
      const iconSpan = item.querySelector('.faq-icon');
      if (!answer || !iconSpan) return;
      
      const isHidden = answer.classList.contains('hidden');
      if (isHidden) {
        answer.classList.remove('hidden');
        iconSpan.innerHTML = minusIcon;
      } else {
        answer.classList.add('hidden');
        iconSpan.innerHTML = plusIcon;
      }
    }

    function spawnFaqBlocks() {
      const container = document.getElementById('faq-container');
      if (!container) return;
      
      container.innerHTML = '';
      
      faqData.forEach((item, index) => {
        const faqDiv = document.createElement('div');
        faqDiv.className = 'bg-white border border-slate-200 rounded-xl overflow-hidden faq-item';
        
        const button = document.createElement('button');
        button.className = 'w-full flex items-center justify-between p-5 text-left font-semibold text-slate-900 hover:bg-slate-50 transition-colors group';
        button.setAttribute('onclick', 'window.toggleFaqExternal(this)');
        
        const questionSpan = document.createElement('span');
        questionSpan.textContent = item.question;
        
        const iconSpan = document.createElement('span');
        iconSpan.className = 'faq-icon flex items-center justify-center';
        iconSpan.innerHTML = plusIcon;
        
        button.appendChild(questionSpan);
        button.appendChild(iconSpan);
        
        const answerDiv = document.createElement('div');
        answerDiv.className = 'faq-answer hidden px-5 pb-5 text-slate-600 text-sm leading-relaxed';
        answerDiv.textContent = item.answer;
        
        faqDiv.appendChild(button);
        faqDiv.appendChild(answerDiv);
        container.appendChild(faqDiv);
      });
    }
    
    window.toggleFaqExternal = function(btn) {
      toggleFaq(btn);
    };
    
    spawnFaqBlocks();
  })();
</script>
</body>
</html>
