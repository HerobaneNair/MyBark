<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team – MyBark</title>
  <link rel="icon" href="favicon.jfif" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400&family=Poppins:wght@300&display=swap" rel="stylesheet">
  <style>body{font-family:'Poppins',sans-serif} h1,h2,h3{font-family:'Lora',serif}</style>
</head>
<body data-page="team" class="bg-slate-50 text-slate-800">

<div id="site-nav"></div>

<header class="bg-gradient-to-br from-slate-900 to-slate-800 text-white">
  <div class="max-w-7xl mx-auto px-6 py-20">
    <p class="uppercase tracking-[0.2em] text-amber-500 text-xs font-semibold mb-3">Our Team</p>
    <h1 class="text-4xl md:text-5xl font-bold mb-4">Meet the Team</h1>
    <p class="text-slate-300 max-w-3xl">The professionals behind MyBark, Sriram Nair and his team of guinea pigs.</p>
  </div>
</header>

<section class="max-w-7xl mx-auto px-6 py-20">
  <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">

    <button onclick="document.getElementById('guineaSound').play()" class="group bg-white border border-slate-200 rounded-2xl overflow-hidden hover:shadow-xl hover:-translate-y-1 transition">
      <div class="aspect-[4/3] overflow-hidden bg-slate-100">
        <img src="guineas/cilantro.jpg" alt="Cilantro" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
      </div>
      <div class="p-5">

        <p class="text-slate-600 text-sm mt-1">Chief Legal Officer & Constitutional Hay-Law Authority</p>
        <span class="inline-block mt-3 text-amber-600 font-semibold text-sm group-hover:underline">Play Sound →</span>
      </div>
    </button>

    <button onclick="document.getElementById('guineaSound').play()" class="group bg-white border border-slate-200 rounded-2xl overflow-hidden hover:shadow-xl hover:-translate-y-1 transition">
      <div class="aspect-[4/3] overflow-hidden bg-slate-100">
        <img src="guineas/kathu.jpg" alt="Kathu" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
      </div>
      <div class="p-5">
        <div class="text-xs uppercase tracking-widest text-amber-600 font-semibold">Records Director</div>
        <h3 class="text-xl font-bold text-slate-900 mt-1">Kathu</h3>

        <span class="inline-block mt-3 text-amber-600 font-semibold text-sm group-hover:underline">Play Sound →</span>
      </div>
    </button>

    <button onclick="document.getElementById('guineaSound').play()" class="group bg-white border border-slate-200 rounded-2xl overflow-hidden hover:shadow-xl hover:-translate-y-1 transition">
      <div class="aspect-[4/3] overflow-hidden bg-slate-100">
        <img src="guineas/pathu.jpg" alt="Pathu" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
      </div>
      <div class="p-5">
        <div class="text-xs uppercase tracking-widest text-amber-600 font-semibold">Chief Technologist</div>
        <h3 class="text-xl font-bold text-slate-900 mt-1">Pathu</h3>
        <p class="text-slate-600 text-sm mt-1">Chief Technology Officer & Digital Burrow Architect</p>
        <span class="inline-block mt-3 text-amber-600 font-semibold text-sm group-hover:underline">Play Sound →</span>
      </div>
    </button>

    <a href="cv-sriram.html" class="group bg-white border border-slate-200 rounded-2xl overflow-hidden hover:shadow-xl hover:-translate-y-1 transition">
      <div class="aspect-[4/3] overflow-hidden bg-slate-100 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-24 h-24 text-slate-300"><path d="M7.5 6.75a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0zM3.75 21a8.25 8.25 0 0 1 16.5 0v.75H3.75V21z"/></svg>
      </div>
      <div class="p-5">
        <div class="text-xs uppercase tracking-widest text-amber-600 font-semibold">Software Engineer</div>
        <h3 class="text-xl font-bold text-slate-900 mt-1">Sriram Nair</h3>
        <p class="text-slate-600 text-sm mt-1">Engineering & Systems Consultant</p>
        <span class="inline-block mt-3 text-amber-600 font-semibold text-sm group-hover:underline">View CV →</span>
      </div>
    </a>

  </div>

<div id="site-footer"></div>
<script src="main.js"></script>
<audio id="guineaSound" src="guineas/guinea_sound.mp3" preload="auto"></audio>
